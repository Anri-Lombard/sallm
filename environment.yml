name: sallm-ner
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - pytorch::pytorch>=2.0.0
  - pytorch::pytorch-cuda=12.1
  - transformers>=4.40.0
  - datasets
  - wandb
  - pyyaml
  - scipy
  - numpy
  - pydantic
  - regex
  - black
  - mypy
  - pytest
  - pip:
    - "accelerate"
    - "types-pyyaml"
    - "tabulate"
    - "mamba-ssm"
    - "causal-conv1d>=1.2.0"
