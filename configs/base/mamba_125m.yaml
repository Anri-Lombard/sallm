mode: "train"

wandb:
  project: "sallm-mamba2"
  name: "125m"

model:
  architecture: "mamba2"
  config:
    # Parameters adapted from official state-spaces/mamba2-130m
    hidden_size: 768
    num_hidden_layers: 24
    state_size: 128
    conv_kernel: 4
    expand: 2
    rms_norm_eps: 1e-5
    rope_theta: 10000.0
  param_validation:
    min_params_m: 120.0
    max_params_m: 130.0

data:
  path: "${SCRATCH}/masters/sallm/data/sallm_processed"
  train_split: "train"
  eval_split: "validation"
  test_split: "test"

tokenizer:
  path: "${HOME}/masters/sallm/tokenizer/sallm_bpe_tokenizer"

training:
  output_dir: "${SCRATCH}/masters/sallm/checkpoints/sallm-mamba2-125m"
  logging_dir: "${SCRATCH}/masters/sallm/logs/sallm-mamba2-125m"
  learning_rate: 3e-4
  weight_decay: 0.01
  num_train_epochs: 3
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  bf16: true
  logging_steps: 10
  eval_strategy: "steps"
  eval_steps: 500
  save_strategy: "steps"
  save_steps: 500
  save_total_limit: 2
  report_to: "wandb"
  resume_from_checkpoint: null
