[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "sallm"
version = "0.1.0"
description = "A modular framework for training small language models for South African languages."
authors = ["Anri Lombard <anri.m.lombard@gmail.com>"]
license = "MIT"
packages = [{include = "sallm", from = "src/main"}]

[tool.poetry.dependencies]
python = "^3.12"
torch = "^2.7.1"
transformers = "^4.52.4"
datasets = "^3.6.0"
wandb = "^0.20.1"
pydantic = "^2.11.7"
pyyaml = "^6.0.2"
numpy = "^2.3.0"
scipy = "1.15.3"
accelerate = "^1.7.0"
regex = "^2024.11.6"
tokenizers = "^0.21.1"
flash-attn = "^2.8.0.post2"
lm-eval = "^0.4.9"

# [tool.poetry.group.gpu.dependencies]
# mamba-ssm = ">=2.2.4"
# causal-conv1d = ">=1.5.0.post8"


[tool.poetry.group.dev.dependencies]
black = "^25.1.0"
mypy = "^1.16.1"
pytest = "^8.4.1"
types-pyyaml = "^6.0.12.20250516"

[tool.black]
line-length = 88
target-version = ['py312']

[tool.mypy]
python_version = "3.12"
warn_return_any = true
ignore_missing_imports = true
disallow_untyped_defs = true

[tool.pytest.ini_options]
minversion = "6.0"
testpaths = [
    "tests",
]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
