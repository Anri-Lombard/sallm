default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.11
    hooks:
      - id: ruff-check
        name: ruff lint (no fixes)
        args: ["--no-fix"]
      - id: ruff-format

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.37.1
    hooks:
      - id: yamllint
        args: [--strict, -c=.yamllint]

  - repo: local
    hooks:
      - id: ty-check
        name: ty type check
        entry: uv run ty check src/main/sallm --output-format github
        language: system
        pass_filenames: false
        always_run: true
