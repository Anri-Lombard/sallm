name: Linter and Formatter Checks

on: [push, pull_request]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yamllint mypy black

      - name: Run yamllint
        run: |
          yamllint .

      - name: Run mypy
        run: |
          mypy src/

      - name: Run black
        run: |
          black --check .
