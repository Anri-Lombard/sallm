id: "masakhaner_v1"
prompt: |
  Named entities refers to names of location, organisation and personal name.

  For example, 'David is an employee of Amazon and he is visiting New York next
  week to see Esther' will be PERSON: David $ ORGANIZATION: Amazon $ LOCATION:
  New York $ PERSON: Esther

  Ensure the output strictly follows the format: label:
  entity $ label: entity, with each unique entity on a separate label line, avoiding
  grouped entities (e.g., avoid LOC: entity, entity) or irrelevant entries like none.

  Text: {text}
  Return only the output
task: "masakhane_named_entity_recognition"
ner_tags:
  - "O"
  - "B-PER"
  - "I-PER"
  - "B-ORG"
  - "I-ORG"
  - "B-LOC"
  - "I-LOC"
  - "B-DATE"
  - "I-DATE"
