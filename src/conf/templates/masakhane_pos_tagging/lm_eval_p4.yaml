prompt: |
  Annotate each word in the provided sentence with the appropriate POS tag.
  The annotation list is: ['ADJ', 'ADP', 'ADV', 'AUX', 'CCONJ', 'DET', 'INTJ',
  'NOUN', 'NUM', 'PART', 'PRON', 'PROPN', 'PUNCT', 'SCONJ', 'SYM', 'VERB', 'X'].
  The input sentence will be a list of words in the sentence. The output format should
  be a list of tuples, where each tuple consists of a word from the input text and
  its corresponding POS tag label from the POS tag label set provided. Your response
  should include only a list of tuples, in the order that the words appear in the input
  sentence, including punctuations, with each tuple containing the corresponding POS tag
  label for a word.

  Sentence: {tokens}
  Output:
task: "masakhane_pos_tagging"
