mode: FINETUNE

wandb: {project: "sallm-ft", name: "llama-125m-sa-general-all"}

model:
  architecture: "llama"
  init_checkpoint: "${oc.env:SCRATCH}/masters/sallm/checkpoints/sallm-llama-125m/final_model"

peft:
  method: "lora"
  kwargs: {r: 128, lora_alpha: 256, lora_dropout: 0.1}

dataset:
  hf_name: "mix:sa_general"
  subset: null
  languages: null
  task: INSTRUCTION
  splits: {train: "train", val: "validation"}
  templates: []
  template_choice: ALL
  packing: false
  assistant_only_loss: true
  max_seq_length: 2048

tokenizer: {path: "${oc.env:HOME}/masters/sallm/tokenizer/sallm_bpe_tokenizer"}

training:
  output_dir: "${oc.env:SCRATCH}/masters/sallm/checkpoints/ft_llama_125m_sa_general_all"
  logging_dir: "${oc.env:SCRATCH}/masters/sallm/logs/ft_llama_125m_sa_general_all"
  run_name: "llama-125m-sa-general-all"
  learning_rate: 3.0e-5
  adam_beta2: 0.95
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 16
  num_train_epochs: 3
  weight_decay: 0.05
  max_grad_norm: 1.0
  bf16: true
  gradient_checkpointing: false
  logging_steps: 10
  eval_strategy: "epoch"
  save_strategy: "no"
  dataloader_num_workers: 8
  eval_accumulation_steps: 1
  report_to: "wandb"
  ddp_find_unused_parameters: false
