mode: FINETUNE

wandb:
  project: "sallm-ft"
  name: "mamba-125m-sib-eng"

model:
  architecture: "mamba2"
  init_checkpoint: "${oc.env:SCRATCH}/masters/sallm/checkpoints/sallm-mamba-125m/final_model"

peft:
  method: "lora"
  kwargs:
    r: 256
    lora_alpha: 512
    lora_dropout: 0.1
    target_modules: ["in_proj", "x_proj", "embeddings", "out_proj"]

dataset:
  hf_name: "Davlan/sib200"
  subset: "eng_Latn"
  task: CLASSIFICATION
  splits: {train: "train", val: "validation"}
  templates:
    - {id: "sib_topic_classification/lm_eval_p1", weight: 1.0}
    - {id: "sib_topic_classification/lm_eval_p2", weight: 1.0}
    - {id: "sib_topic_classification/lm_eval_p3", weight: 1.0}
    - {id: "sib_topic_classification/lm_eval_p4", weight: 1.0}
    - {id: "sib_topic_classification/lm_eval_p5", weight: 1.0}
  template_choice: CYCLE
  label_column: "category"
  packing: false
  assistant_only_loss: true
  max_seq_length: 1024

tokenizer:
  path: "${oc.env:HOME}/masters/sallm/tokenizer/sallm_bpe_tokenizer"

training:
  output_dir: "${oc.env:SCRATCH}/masters/sallm/checkpoints/ft_mamba_125m_sib_eng"
  logging_dir: "${oc.env:SCRATCH}/masters/sallm/logs/ft_mamba_125m_sib_eng"
  run_name: "mamba-125m-sib-lora-eng"
  learning_rate: 9.23415716207728e-05
  weight_decay: 0.1340385821569752
  adam_beta2: 0.95
  max_grad_norm: 1.0
  gradient_accumulation_steps: 2
  lr_scheduler_type: "constant_with_warmup"
  warmup_ratio: 0
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 4
  eval_accumulation_steps: 1
  num_train_epochs: 10
  bf16: true
  gradient_checkpointing: true
  logging_steps: 10
  eval_strategy: "epoch"
  save_strategy: "no"
  dataloader_num_workers: 8
  report_to: "wandb"
  ddp_find_unused_parameters: true
