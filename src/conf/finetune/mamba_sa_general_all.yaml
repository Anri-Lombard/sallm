mode: FINETUNE
wandb:
  project: sallm-ft
  name: mamba-125m-sa-general-all
model:
  architecture: mamba2
  init_checkpoint: anrilombard/sallm-mamba-125m
peft:
  method: lora
  kwargs:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    target_modules:
      - in_proj
      - x_proj
dataset:
  hf_name: mix:sa_general
  subset: null
  languages: null
  task: INSTRUCTION
  splits:
    train: train
    val: validation
  templates: []
  template_choice: CYCLE
  packing: false
  assistant_only_loss: true
  max_seq_length: 1024
  mix_weights:
    sib: 3.3
    news: 2.4
    ner: 1.7
    afrihg: 0.4
    t2x: 1.0
  mix_temperature: 0.15
  mix_epoch_size: sum
  mix_min_prob: 0.02
  mix_max_prob: 0.6
tokenizer:
  path: ${oc.env:HOME}/masters/sallm/tokenizer/sallm_bpe_tokenizer
training:
  output_dir: ${oc.env:SCRATCH}/masters/sallm/checkpoints/ft_mamba_125m_sa_general_all
  logging_dir: ${oc.env:SCRATCH}/masters/sallm/logs/ft_mamba_125m_sa_general_all
  run_name: mamba-125m-sa-general-all
  learning_rate: 8.0e-05
  weight_decay: 0.01
  adam_beta2: 0.95
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  num_train_epochs: 1
  max_grad_norm: 1.0
  bf16: true
  gradient_checkpointing: false
  logging_steps: 10
  eval_strategy: epoch
  save_strategy: epoch
  dataloader_num_workers: 4
  eval_accumulation_steps: 1
  report_to: wandb
  ddp_find_unused_parameters: false
  adam_beta1: 0.9
  save_total_limit: 1
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  early_stopping_patience: 3
  early_stopping_threshold: 0.001
hub:
  enabled: true
  organization: anrilombard
  private: true
  push_adapter: true
  push_merged: false
