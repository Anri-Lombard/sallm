mode: FINETUNE

wandb:
  project: "sallm-ft"
  name: "mamba-125m-belebele-zul"

model:
  architecture: "mamba2"
  init_checkpoint: "${oc.env:SCRATCH}/masters/sallm/checkpoints/sallm-mamba-125m/final_model"

peft:
  method: "lora"
  kwargs:
    r: 128
    lora_alpha: 256
    lora_dropout: 0.1
    target_modules: ["in_proj", "x_proj", "embeddings", "out_proj"]

dataset:
  hf_name: "facebook/belebele"
  subset: "zul_Latn"
  splits: {train: "test", val: "test"}
  templates:
    - {id: "belebele/lm_eval_p1", weight: 1.0}
    - {id: "belebele/lm_eval_p2", weight: 1.0}
    - {id: "belebele/lm_eval_p3", weight: 1.0}
    - {id: "belebele/lm_eval_p4", weight: 1.0}
    - {id: "belebele/lm_eval_p5", weight: 1.0}
  template_choice: CYCLE
  label_column: "correct_answer_num"
  task: CLASSIFICATION
  packing: false
  assistant_only_loss: true
  max_seq_length: 2048

tokenizer: {path: "${oc.env:HOME}/masters/sallm/tokenizer/sallm_bpe_tokenizer"}

training:
  output_dir: "${oc.env:SCRATCH}/masters/sallm/checkpoints/ft_mamba_125m_belebele_zul"
  logging_dir: "${oc.env:SCRATCH}/masters/sallm/logs/ft_mamba_125m_belebele_zul"
  run_name: "mamba-125m-belebele-zul"
  learning_rate: 0.0004898498021315701
  adam_beta2: 0.95
  gradient_accumulation_steps: 4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  num_train_epochs: 20
  weight_decay: 0.09585803034397392
  bf16: true
  gradient_checkpointing: true
  logging_steps: 10
  eval_strategy: "epoch"
  save_strategy: "no"
  dataloader_num_workers: 8
  report_to: "wandb"
  ddp_find_unused_parameters: true
  max_grad_norm: 1.0
