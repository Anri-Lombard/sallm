mode: FINETUNE

wandb:
  project: "sallm-ft"
  name: "mamba-125m-afriinstruct-xho"

model:
  architecture: "mamba2"
  init_checkpoint: "${oc.env:SCRATCH}/masters/sallm/checkpoints/sallm-mamba-125m/final_model"

peft:
  method: "lora"
  kwargs: {r: 128, lora_alpha: 256, lora_dropout: 0.1, target_modules: ["in_proj", "x_proj", "embeddings", "out_proj"]}

dataset:
  hf_name: "llama-lang-adapt/AfriInstruct-Data"
  subset: "xho"
  task: INSTRUCTION
  splits: {train: "train", val: "validation"}
  templates: []
  packing: false
  assistant_only_loss: true
  max_seq_length: 2048

tokenizer: {path: "${oc.env:HOME}/masters/sallm/tokenizer/sallm_bpe_tokenizer"}

training:
  output_dir: "${oc.env:SCRATCH}/masters/sallm/checkpoints/ft_mamba_125m_instruct_xho"
  logging_dir: "${oc.env:SCRATCH}/masters/sallm/logs/ft_mamba_125m_instruct_xho"
  run_name: "mamba-125m-afriinstruct-lora-xho"
  learning_rate: 3.0e-5
  adam_beta2: 0.95
  gradient_accumulation_steps: 4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 4
  num_train_epochs: 3
  bf16: true
  logging_steps: 25
  eval_strategy: "epoch"
  save_strategy: "no"
  dataloader_num_workers: 8
  report_to: "wandb"
  ddp_find_unused_parameters: true
