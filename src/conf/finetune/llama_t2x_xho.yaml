mode: FINETUNE

wandb:
  project: "sallm-ft"
  name: "llama-125m-t2x-xho"

model:
  architecture: "llama"
  init_checkpoint: "${oc.env:SCRATCH}/masters/sallm/checkpoints/sallm-llama-125m/final_model"

peft:
  method: "none"

dataset:
  hf_name: "github:francois-meyer/t2x"
  subset: "xho"
  splits: {train: "train", val: "validation"}
  task: INSTRUCTION
  templates:
    - {id: "t2x_verbalisation/v1", weight: 1}
  template_choice: ALL
  packing: false
  assistant_only_loss: true
  max_seq_length: 1024

tokenizer: {path: "${oc.env:HOME}/masters/sallm/tokenizer/sallm_bpe_tokenizer"}

training:
  output_dir: "${oc.env:SCRATCH}/masters/sallm/checkpoints/ft_llama_125m_t2x_xho"
  logging_dir: "${oc.env:SCRATCH}/masters/sallm/logs/ft_llama_125m_t2x_xho"
  run_name: "llama-125m-t2x-xho"
  learning_rate: 5.0e-5
  adam_beta2: 0.95
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 1
  num_train_epochs: 4
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  logging_steps: 10
  logging_first_step: true
  eval_strategy: "steps"
  eval_steps: 200
  save_strategy: "no"
  dataloader_num_workers: 8
  eval_accumulation_steps: 1
  report_to: "wandb"
  ddp_find_unused_parameters: false
