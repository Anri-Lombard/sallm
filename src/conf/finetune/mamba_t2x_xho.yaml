mode: FINETUNE
wandb:
  project: sallm-ft
  name: mamba-125m-t2x-xho
model:
  architecture: mamba2
  init_checkpoint: anrilombard/sallm-mamba-125m
peft:
  method: lora
  kwargs:
    r: 256
    lora_alpha: 512
    lora_dropout: 0.1
    target_modules:
      - in_proj
      - x_proj
      - embeddings
dataset:
  hf_name: github:francois-meyer/t2x
  subset: xho
  splits:
    train: train
    val: validation
  task: INSTRUCTION
  templates:
    - id: t2x_verbalisation/v1
      weight: 1
  template_choice: CYCLE
  packing: false
  assistant_only_loss: true
  max_seq_length: 2048
tokenizer:
  path: ${oc.env:HOME}/masters/sallm/tokenizer/sallm_bpe_tokenizer
generation_decoding:
  strategy: beam
  num_beams: 5
  length_penalty: 1.0
  early_stopping: true
training:
  output_dir: ${oc.env:SCRATCH}/masters/sallm/checkpoints/ft_mamba_125m_t2x_xho
  logging_dir: ${oc.env:SCRATCH}/masters/sallm/logs/ft_mamba_125m_t2x_xho
  run_name: mamba-125m-t2x-xho
  learning_rate: 0.0004391879915118366
  weight_decay: 0.004094368653325598
  adam_beta2: 0.95
  lr_scheduler_type: cosine
  warmup_ratio: 0.1
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 2
  num_train_epochs: 4
  max_grad_norm: 1.0
  bf16: true
  gradient_checkpointing: true
  label_smoothing_factor: 0.05
  logging_steps: 10
  logging_first_step: true
  eval_strategy: epoch
  save_strategy: 'no'
  dataloader_num_workers: 8
  eval_accumulation_steps: 1
  report_to: wandb
  ddp_find_unused_parameters: true
hub:
  enabled: true
  organization: anrilombard
  private: true
  push_adapter: true
  push_merged: false
