defaults:
  - defaults/datasets/masakhanews@_here_
  - _self_
mode: FINETUNE
wandb:
  project: sallm-ft
  name: llama-125m-news-xho
model:
  architecture: llama
  init_checkpoint: ${oc.env:SCRATCH}/masters/sallm/checkpoints/sallm-llama-125m/final_model
peft:
  method: lora
  kwargs:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.2
dataset:
  subset: xho
  max_seq_length: 2048
tokenizer:
  path: ${oc.env:HOME}/masters/sallm/tokenizer/sallm_bpe_tokenizer
training:
  output_dir: ${oc.env:SCRATCH}/masters/sallm/checkpoints/ft_llama_125m_news_messages_xho
  logging_dir: ${oc.env:SCRATCH}/masters/sallm/logs/ft_llama_125m_news_messages_xho
  run_name: llama-125m-news-lora-finetune-messages
  learning_rate: 3.0e-05
  weight_decay: 0.1
  adam_beta2: 0.95
  max_grad_norm: 1.0
  gradient_accumulation_steps: 4
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  eval_accumulation_steps: 1
  num_train_epochs: 20
  bf16: true
  logging_steps: 10
  eval_strategy: epoch
  save_strategy: 'no'
  dataloader_num_workers: 4
  report_to: wandb
  ddp_find_unused_parameters: false
hub:
  enabled: true
  organization: anrilombard
  private: true
  push_adapter: true
  push_merged: false
