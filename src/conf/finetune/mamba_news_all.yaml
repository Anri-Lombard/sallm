mode: FINETUNE

wandb: {project: "sallm-ft", name: "mamba-125m-news-all"}

model:
  architecture: "mamba2"
  init_checkpoint: "${oc.env:SCRATCH}/masters/sallm/checkpoints/sallm-mamba-125m/final_model"

peft:
  method: "lora"
  kwargs:
    r: 32
    lora_alpha: 128
    lora_dropout: 0.2
    target_modules: ["in_proj", "x_proj", "embeddings", "out_proj"]

dataset:
  hf_name: "masakhane/masakhanews"
  subset: null
  languages: ["eng", "xho"]
  splits: {train: "train", val: "validation"}
  templates:
    - {id: "masakhane_news_classification/lm_eval_p1", weight: 1.0}
    - {id: "masakhane_news_classification/lm_eval_p2", weight: 1.0}
    - {id: "masakhane_news_classification/lm_eval_p3", weight: 1.0}
    - {id: "masakhane_news_classification/lm_eval_p4", weight: 1.0}
    - {id: "masakhane_news_classification/lm_eval_p5", weight: 1.0}
  template_choice: CYCLE
  label_column: "label"
  task: CLASSIFICATION
  packing: false
  assistant_only_loss: true
  max_seq_length: 1024

tokenizer: {path: "${oc.env:HOME}/masters/sallm/tokenizer/sallm_bpe_tokenizer"}

training:
  output_dir: "${oc.env:SCRATCH}/masters/sallm/checkpoints/ft_mamba_125m_news_all"
  logging_dir: "${oc.env:SCRATCH}/masters/sallm/logs/ft_mamba_125m_news_all"
  run_name: "mamba-125m-news-lora-finetune-all"
  learning_rate: 0.00031903644717836413
  weight_decay: 0.17402455472832035
  adam_beta2: 0.95
  max_grad_norm: 1.0
  gradient_accumulation_steps: 16
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  eval_accumulation_steps: 1
  num_train_epochs: 15
  bf16: true
  gradient_checkpointing: false
  logging_steps: 10
  eval_strategy: "epoch"
  save_strategy: "no"
  dataloader_num_workers: 8
  report_to: "wandb"
  ddp_find_unused_parameters: true
