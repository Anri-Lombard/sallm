mode: FINETUNE
wandb:
  project: sallm-ft
  name: mamba-125m-injongo-intent-zul
model:
  architecture: mamba2
  init_checkpoint: anrilombard/sallm-mamba-125m
peft:
  method: lora
  kwargs:
    r: 256
    lora_alpha: 512
    lora_dropout: 0.05
    target_modules:
      - in_proj
      - x_proj
      - embeddings
dataset:
  hf_name: masakhane/InjongoIntent
  subset: zul
  splits:
    train: train
    val: validation
  task: CLASSIFICATION
  label_column: intent
  templates:
    - id: injongointent_intent_classification/lm_eval_p1
      weight: 1.0
    - id: injongointent_intent_classification/lm_eval_p2
      weight: 1.0
    - id: injongointent_intent_classification/lm_eval_p3
      weight: 1.0
    - id: injongointent_intent_classification/lm_eval_p4
      weight: 1.0
    - id: injongointent_intent_classification/lm_eval_p5
      weight: 1.0
  template_choice: CYCLE
  packing: false
  assistant_only_loss: true
  max_seq_length: 2048
tokenizer:
  path: ${oc.env:HOME}/masters/sallm/tokenizer/sallm_bpe_tokenizer
training:
  output_dir: ${oc.env:SCRATCH}/masters/sallm/checkpoints/ft_mamba_125m_injongointent_zul
  logging_dir: ${oc.env:SCRATCH}/masters/sallm/logs/ft_mamba_125m_injongointent_zul
  run_name: mamba-125m-injongo-intent-zul
  learning_rate: 0.0004284853732593701
  weight_decay: 0.18885105791253376
  adam_beta2: 0.95
  max_grad_norm: 1.0
  gradient_accumulation_steps: 2
  lr_scheduler_type: linear
  warmup_ratio: 0
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 4
  eval_accumulation_steps: 1
  num_train_epochs: 20
  bf16: true
  gradient_checkpointing: false
  logging_steps: 10
  eval_strategy: epoch
  save_strategy: 'no'
  dataloader_num_workers: 8
  report_to: wandb
  ddp_find_unused_parameters: true
hub:
  enabled: true
  organization: anrilombard
  private: true
  push_adapter: true
  push_merged: false
