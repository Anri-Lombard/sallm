mode: FINETUNE

wandb: {project: "sallm-ft", name: "mamba-125m-ner-xho"}

model:
  architecture: "mamba2"
  init_checkpoint: "${oc.env:SCRATCH}/masters/sallm/checkpoints/sallm-mamba-125m/final_model"

peft:
  method: "lora"
  kwargs:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    target_modules: ["in_proj", "x_proj"]

dataset:
  hf_name: "masakhane/masakhaner2"
  subset: "xho"
  task: NAMED_ENTITY_RECOGNITION
  splits: {train: "train", val: "validation"}
  templates:
    - {id: "masakhane_named_entity_recognition/lm_eval_p1", weight: 1.0}
    - {id: "masakhane_named_entity_recognition/lm_eval_p2", weight: 1.0}
    - {id: "masakhane_named_entity_recognition/lm_eval_p3", weight: 1.0}
    - {id: "masakhane_named_entity_recognition/lm_eval_p4", weight: 1.0}
    - {id: "masakhane_named_entity_recognition/lm_eval_p5", weight: 1.0}
  template_choice: CYCLE
  packing: false
  assistant_only_loss: true
  max_seq_length: 2048

tokenizer:
  {path: "${oc.env:HOME}/masters/sallm/tokenizer/sallm_bpe_tokenizer"}

training:
  output_dir: "${oc.env:SCRATCH}/masters/sallm/checkpoints/ft_mamba_125m_ner_xho"
  logging_dir: "${oc.env:SCRATCH}/masters/sallm/logs/ft_mamba_125m_ner_xho"
  run_name: "mamba-125m-ner-lora-finetune-xho"
  learning_rate: 0.0004496585905434496
  weight_decay: 0.13449041980438445
  adam_beta2: 0.95
  max_grad_norm: 1.0
  gradient_accumulation_steps: 16
  lr_scheduler_type: "constant_with_warmup"
  warmup_ratio: 0
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  eval_accumulation_steps: 1
  num_train_epochs: 20
  bf16: true
  gradient_checkpointing: true
  logging_steps: 10
  eval_strategy: "epoch"
  save_strategy: "no"
  dataloader_num_workers: 8
  report_to: "wandb"
  ddp_find_unused_parameters: true

hub:
  enabled: true
  organization: anrilombard
  private: true
  push_adapter: true
  push_merged: false
