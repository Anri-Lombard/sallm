mode: FINETUNE
wandb:
  project: sallm-ft
  name: mamba-125m-afrihg-xho
model:
  architecture: mamba2
  init_checkpoint: anrilombard/sallm-mamba-125m
peft:
  method: lora
  kwargs:
    r: 64
    lora_alpha: 128
    lora_dropout: 0.05
    target_modules:
      - in_proj
      - x_proj
      - embeddings
dataset:
  hf_name: github:dadelani/AfriHG
  subset: xho
  splits:
    train: train
    val: validation
  task: INSTRUCTION
  templates:
    - id: afrihg_headline/v1
      weight: 1
  template_choice: CYCLE
  packing: false
  assistant_only_loss: true
  max_seq_length: 1024
tokenizer:
  path: ${oc.env:HOME}/masters/sallm/tokenizer/sallm_bpe_tokenizer
generation_decoding:
  strategy: beam
  num_beams: 5
  length_penalty: 0.7
  early_stopping: true
training:
  output_dir: ${oc.env:SCRATCH}/masters/sallm/checkpoints/ft_mamba_125m_afrihg_xho
  logging_dir: ${oc.env:SCRATCH}/masters/sallm/logs/ft_mamba_125m_afrihg_xho
  run_name: mamba-125m-afrihg-xho
  learning_rate: 0.0004974463674781711
  weight_decay: 0.08048615399655575
  adam_beta2: 0.95
  lr_scheduler_type: linear
  warmup_ratio: 0
  per_device_train_batch_size: 32
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 8
  num_train_epochs: 3
  max_grad_norm: 1.0
  bf16: true
  gradient_checkpointing: true
  label_smoothing_factor: 0.05
  logging_steps: 10
  logging_first_step: true
  eval_strategy: epoch
  save_strategy: 'no'
  dataloader_num_workers: 8
  eval_accumulation_steps: 1
  report_to: wandb
  ddp_find_unused_parameters: true
hub:
  enabled: true
  organization: anrilombard
  private: true
  push_adapter: true
  push_merged: false
