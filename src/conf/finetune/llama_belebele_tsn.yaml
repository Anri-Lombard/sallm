mode: FINETUNE

wandb:
  project: "sallm-ft"
  name: "llama-125m-belebele-tsn"

model:
  architecture: "llama"
  init_checkpoint: "${oc.env:SCRATCH}/masters/sallm/checkpoints/sallm-llama-125m/final_model"

peft:
  method: "lora"
  kwargs:
    r: 128
    lora_alpha: 256
    lora_dropout: 0.1

dataset:
  hf_name: "facebook/belebele"
  subset: "tsn_Latn"
  splits: {train: "test", val: "test"}
  templates:
    - {id: "belebele/v5", weight: 1.0}
  label_column: "correct_answer_num"
  task: CLASSIFICATION
  packing: false
  assistant_only_loss: true
  max_seq_length: 1024

tokenizer: {path: "${oc.env:HOME}/masters/sallm/tokenizer/sallm_bpe_tokenizer"}

training:
  output_dir: "${oc.env:SCRATCH}/masters/sallm/checkpoints/ft_llama_125m_belebele_tsn"
  logging_dir: "${oc.env:SCRATCH}/masters/sallm/logs/ft_llama_125m_belebele_tsn"
  run_name: "llama-125m-belebele-tsn"
  learning_rate: 0.0002901957859183562
  weight_decay: 0.17288555074262296
  adam_beta2: 0.95
  max_grad_norm: 1.0
  gradient_accumulation_steps: 8
  lr_scheduler_type: "cosine"
  warmup_ratio: 0
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 8
  eval_accumulation_steps: 1
  num_train_epochs: 20
  bf16: true
  gradient_checkpointing: false
  logging_steps: 10
  eval_strategy: "epoch"
  save_strategy: "no"
  dataloader_num_workers: 8
  report_to: "wandb"
  ddp_find_unused_parameters: true
