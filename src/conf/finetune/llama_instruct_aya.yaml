mode: FINETUNE

wandb:
  project: "sallm-ft"
  name: "llama-125m-aya-instruct"

model:
  architecture: "llama"
  init_checkpoint: "${oc.env:SCRATCH}/masters/sallm/checkpoints/sallm-llama-125m/final_model"

peft:
  method: "lora"
  kwargs: {r: 128, lora_alpha: 256, lora_dropout: 0.1}

dataset:
  hf_name: "CohereLabs/aya_dataset"
  subset: null
  task: INSTRUCTION
  splits: {train: "train", val: "test"}
  templates: []
  packing: false
  assistant_only_loss: true
  max_seq_length: 1536

tokenizer: {path: "${oc.env:HOME}/masters/sallm/tokenizer/sallm_bpe_tokenizer"}

training:
  output_dir: "${oc.env:SCRATCH}/masters/sallm/checkpoints/ft_llama_125m_aya_instruct"
  logging_dir: "${oc.env:SCRATCH}/masters/sallm/logs/ft_llama_125m_aya_instruct"
  run_name: "llama-125m-aya-lora"
  learning_rate: 2.0e-5
  adam_beta2: 0.95
  gradient_accumulation_steps: 16
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  num_train_epochs: 3
  bf16: true
  fp16: false
  gradient_checkpointing: false
  logging_steps: 25
  eval_strategy: "epoch"
  save_strategy: "no"
  dataloader_num_workers: 4
  report_to: "wandb"
  ddp_find_unused_parameters: false
