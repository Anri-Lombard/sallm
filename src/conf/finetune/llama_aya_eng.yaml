mode: FINETUNE

wandb:
  project: "sallm-ft"
  name: "llama-aya-eng-instruct"

model:
  architecture: "llama"
  init_checkpoint: "${oc.env:SCRATCH}/masters/sallm/checkpoints/sallm-llama-125m/final_model"

peft:
  method: "lora"
  kwargs: {r: 128, lora_alpha: 256, lora_dropout: 0.1}

dataset:
  hf_name: "CohereLabs/aya_collection_language_split"
  subset: "eng"
  task: INSTRUCTION
  splits: {train: "train", val: "train"}
  templates: []
  packing: false
  assistant_only_loss: true
  max_seq_length: 2048

tokenizer: {path: "${oc.env:HOME}/masters/sallm/tokenizer/sallm_bpe_tokenizer"}

training:
  output_dir: "${oc.env:SCRATCH}/masters/sallm/checkpoints/ft_llama_125m_aya_eng"
  logging_dir: "${oc.env:SCRATCH}/masters/sallm/logs/ft_llama_125m_aya_eng"
  run_name: "llama-125m-aya-eng-lora"
  learning_rate: 2.0e-5
  gradient_accumulation_steps: 4
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 4
  num_train_epochs: 3
  bf16: true
  logging_steps: 25
  eval_strategy: "epoch"
  save_strategy: "no"
  dataloader_num_workers: 8
  report_to: "wandb"
  ddp_find_unused_parameters: false
