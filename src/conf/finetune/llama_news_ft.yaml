mode: FINETUNE

wandb:
  project: "sallm-ft"
  name: "llama-125m-news-v2-messages"

model:
  architecture: "llama"
  init_checkpoint: "${oc.env:SCRATCH}/masters/sallm/checkpoints/sallm-llama-125m/final_model"

# peft:
#   method: "lora"
#   kwargs:
#     r: 64
#     lora_alpha: 128
#     lora_dropout: 0.1

dataset:
  hf_name: "masakhane/masakhanews"
  subset: "eng"
  # label_column: "label"
  splits: {train: "train", val: "validation"}
  templates:
    # - {id: "masakhane_news_classification/v1", weight: 1.0}
    - {id: "masakhane_news_classification/v5", weight: 1.0}
  # TODO add template choice
  # template_choice: CYCLE
  packing: true
  assistant_only_loss: false
  max_seq_length: 1024

tokenizer: {path: "${oc.env:HOME}/masters/sallm/tokenizer/sallm_bpe_tokenizer"}

training:
  output_dir: "${oc.env:SCRATCH}/masters/sallm/checkpoints/ft_llama_125m_news_messages"
  logging_dir: "${oc.env:SCRATCH}/masters/sallm/logs/ft_llama_125m_news_messages"
  run_name: "llama-125m-news-lora-finetune-messages"
  learning_rate: 3.0e-5
  weight_decay: 0.1
  adam_beta2: 0.95
  max_grad_norm: 1.0
  gradient_accumulation_steps: 4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  eval_accumulation_steps: 1
  num_train_epochs: 5
  bf16: true
  logging_steps: 10
  eval_strategy: "epoch"
  save_strategy: "no"
  dataloader_num_workers: 8
  report_to: "wandb"
  ddp_find_unused_parameters: false
