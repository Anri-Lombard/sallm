mode: FINETUNE

wandb:
  project: "sallm-ft"
  name: "llama-125m-news"

model:
  architecture: "llama"
  init_checkpoint: "${oc.env:SCRATCH}/masters/sallm/checkpoints/sallm-llama-125m/final_model"

dataset:
  hf_name: "masakhane/masakhanews"
  subset: "eng"
  text_columns: ["headline_text"]
  label_column: "label"
  splits: {train: "train", val: "validation"}
  templates:
    - {id: "masakhane_news_classification/v1", weight: 1.0}
  template_choice: CYCLE
  max_seq_length: 2048

tokenizer: {path: "${oc.env:HOME}/masters/sallm/tokenizer/sallm_bpe_tokenizer"}

training:
  output_dir: "${oc.env:SCRATCH}/masters/sallm/checkpoints/ft_llama_125m_news"
  logging_dir: "${oc.env:SCRATCH}/masters/sallm/logs/ft_llama_125m_news"
  learning_rate: 1.0e-4
  weight_decay: 0.1
  adam_beta2: 0.95
  max_grad_norm: 1.0
  gradient_accumulation_steps: 4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.2
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 6
  num_train_epochs: 5
  bf16: true
  # fp16: true
  logging_steps: 10
  eval_strategy: "epoch"
  # eval_steps: 200
  save_strategy: "no"
  save_steps: 500
  save_total_limit: 2
  report_to: "wandb"
