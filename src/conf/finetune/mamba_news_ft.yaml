mode: FINETUNE

wandb:
  project: "sallm-ft"
  name: "mamba-125m-news"

model:
  architecture: "mamba2"
  init_checkpoint: "${oc.env:SCRATCH}/masters/sallm/checkpoints/sallm-mamba-125m"

peft:
  method: "qlora"
  kwargs:
    r: 64
    lora_alpha: 16
    lora_dropout: 0.05
    target_modules: ["in_proj", "x_proj", "embeddings", "out_proj"]

dataset:
  hf_name: "masakhane/masakhanews"
  subset: "eng"
  text_columns: ["headline_text"]
  label_column: "label"
  splits: {train: "train", val: "validation"}
  templates:
    - {id: "masakhanews_v1", weight: 1.0}
  task_type: CLASSIFICATION
  template_choice: "cycle"
  max_seq_length: 2048

tokenizer: {path: "${oc.env:HOME}/masters/sallm/tokenizer/sallm_bpe_tokenizer"}

training:
  output_dir: "${oc.env:SCRATCH}/masters/sallm/checkpoints/ft_mamba_125m_news"
  logging_dir: "${oc.env:SCRATCH}/masters/sallm/logs/ft_mamba_125m_news"
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  num_train_epochs: 3
  bf16: true
