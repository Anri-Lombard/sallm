mode: FINETUNE
wandb:
  project: sallm-ft
  name: mamba-125m-afrihg-all
model:
  architecture: mamba2
  init_checkpoint: anrilombard/sallm-mamba-125m
peft:
  method: lora
  kwargs:
    r: 16
    lora_alpha: 32
    lora_dropout: 0
    target_modules:
      - in_proj
      - x_proj
dataset:
  hf_name: github:dadelani/AfriHG
  subset: null
  splits:
    train: train
    val: validation
  task: INSTRUCTION
  templates:
    - id: afrihg_headline/v1
      weight: 1
  template_choice: CYCLE
  packing: false
  assistant_only_loss: true
  max_seq_length: 1024
tokenizer:
  path: ${oc.env:HOME}/masters/sallm/tokenizer/sallm_bpe_tokenizer
generation_decoding:
  strategy: beam
  num_beams: 5
  length_penalty: 0.7
  early_stopping: true
training:
  output_dir: ${oc.env:SCRATCH}/masters/sallm/checkpoints/ft_mamba_125m_afrihg_all
  logging_dir: ${oc.env:SCRATCH}/masters/sallm/logs/ft_mamba_125m_afrihg_all
  run_name: mamba-125m-afrihg-all
  learning_rate: 8.0e-05
  weight_decay: 0.01
  adam_beta2: 0.95
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  num_train_epochs: 5
  max_grad_norm: 1.0
  bf16: true
  gradient_checkpointing: false
  label_smoothing_factor: 0.05
  logging_steps: 10
  logging_first_step: true
  eval_strategy: epoch
  save_strategy: epoch
  dataloader_num_workers: 4
  eval_accumulation_steps: 1
  report_to: wandb
  ddp_find_unused_parameters: false
  adam_beta1: 0.9
  save_total_limit: 1
  load_best_model_at_end: true
  metric_for_best_model: eval_all_rougeL
  greater_is_better: true
  early_stopping_patience: 3
  early_stopping_threshold: 0.001
hub:
  enabled: true
  organization: anrilombard
  private: true
  push_adapter: true
  push_merged: false
