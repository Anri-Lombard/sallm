mode: FINETUNE

wandb:
  project: "sallm-ft"
  name: "llama-125m-afrihg-xho"

model:
  architecture: "llama"
  init_checkpoint: "${oc.env:SCRATCH}/masters/sallm/checkpoints/sallm-llama-125m/final_model"

dataset:
  hf_name: "github:dadelani/AfriHG"
  subset: "xho"
  splits: {train: "train", val: "validation"}
  task: INSTRUCTION
  templates:
    - {id: "afrihg_headline/v1", weight: 1}
  template_choice: ALL
  packing: false
  assistant_only_loss: true
  max_seq_length: 1024

tokenizer: {path: "${oc.env:HOME}/masters/sallm/tokenizer/sallm_bpe_tokenizer"}

training:
  output_dir: "${oc.env:SCRATCH}/masters/sallm/checkpoints/ft_llama_125m_afrihg_xho"
  logging_dir: "${oc.env:SCRATCH}/masters/sallm/logs/ft_llama_125m_afrihg_xho"
  run_name: "llama-125m-afrihg-xho"
  learning_rate: 1.4078842498145848e-05
  adam_beta2: 0.95
  lr_scheduler_type: "constant_with_warmup"
  warmup_ratio: 0.05
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 8
  num_train_epochs: 3
  weight_decay: 0.007615468660511816
  max_grad_norm: 1.0
  bf16: true
  gradient_checkpointing: false  # sweep: true
  label_smoothing_factor: 0.05
  logging_steps: 10
  logging_first_step: true
  eval_strategy: "epoch"
  save_strategy: "no"
  dataloader_num_workers: 8
  eval_accumulation_steps: 1
  report_to: "wandb"
  ddp_find_unused_parameters: false
