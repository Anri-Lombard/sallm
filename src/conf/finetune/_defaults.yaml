wandb:
  project: "sallm-ft"

tokenizer:
  path: "${oc.env:HOME}/masters/sallm/tokenizer/sallm_bpe_tokenizer"

peft:
  method: "lora"
  kwargs:
    r: 128
    lora_alpha: 256
    lora_dropout: 0.1

training:
  output_dir: "${oc.env:SCRATCH}/masters/sallm/checkpoints/ft_${training.model_id}_${training.dataset}_${training.lang}"
  logging_dir: "${oc.env:SCRATCH}/masters/sallm/logs/ft_${training.model_id}_${training.dataset}_${training.lang}"
  run_name: "ft-${training.model_id}-${training.dataset}-${training.lang}"
  learning_rate: 3.0e-5
  adam_beta2: 0.95
  max_grad_norm: 1.0
  gradient_accumulation_steps: 4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  eval_accumulation_steps: 1
  num_train_epochs: 20
  bf16: true
  logging_steps: 10
  eval_strategy: "epoch"
  save_strategy: "no"
  dataloader_num_workers: 8
  report_to: "wandb"
  ddp_find_unused_parameters: false
