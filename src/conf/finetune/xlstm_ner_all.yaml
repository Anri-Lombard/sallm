defaults:
  - defaults/datasets/masakhaner@_here_
  - _self_
mode: FINETUNE
wandb:
  project: sallm-ft
  name: xlstm-125m-ner-all
model:
  architecture: xlstm
  init_checkpoint: anrilombard/sallm-xlstm-125m
peft:
  method: lora
  kwargs:
    r: 128
    lora_alpha: 256
    lora_dropout: 0.05
    target_modules:
      - q
      - k
      - v
      - out_proj
      - embeddings
dataset:
  subset: null
  languages:
    - tsn
    - xho
    - zul
  max_seq_length: 2048
tokenizer:
  path: ${oc.env:HOME}/masters/sallm/tokenizer/sallm_bpe_tokenizer
training:
  output_dir: ${oc.env:SCRATCH}/masters/sallm/checkpoints/ft_xlstm_125m_ner_all
  logging_dir: ${oc.env:SCRATCH}/masters/sallm/logs/ft_xlstm_125m_ner_all
  run_name: xlstm-125m-ner-lora-finetune-all
  learning_rate: 0.0001
  weight_decay: 0.1
  adam_beta2: 0.95
  max_grad_norm: 1.0
  gradient_accumulation_steps: 4
  lr_scheduler_type: cosine
  warmup_ratio: 0.1
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 4
  eval_accumulation_steps: 1
  num_train_epochs: 40
  bf16: false
  gradient_checkpointing: true
  logging_steps: 10
  eval_strategy: epoch
  save_strategy: 'no'
  dataloader_num_workers: 4
  report_to: wandb
  ddp_find_unused_parameters: true
hub:
  enabled: true
  organization: anrilombard
  private: true
  push_adapter: true
  push_merged: false
  base_model_id: anrilombard/sallm-xlstm-125m
