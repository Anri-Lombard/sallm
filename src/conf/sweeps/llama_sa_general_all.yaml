name: hpo-llama-sa-general-all
project: sallm-ft
method: bayes
metric:
  name: eval_loss
  goal: minimize
parameters:
  training.learning_rate:
    distribution: log_uniform_values
    min: 1.0e-5
    max: 5.0e-4
  training.weight_decay:
    distribution: uniform
    min: 0.0
    max: 0.2
  training.warmup_ratio:
    values: [0.0, 0.05, 0.1]
  training.lr_scheduler_type:
    values: [cosine, linear, constant_with_warmup]
  training.gradient_accumulation_steps:
    values: [4, 8, 16]
  training.per_device_train_batch_size:
    values: [2, 4, 8]
  training.num_train_epochs:
    values: [2, 3, 5]
  training.gradient_checkpointing:
    values: [true, false]
  dataset.max_seq_length:
    values: [1024, 2048]
  dataset.mix_temperature:
    values: [0.0, 0.3, 0.5]
  dataset.mix_min_prob:
    values: [0.01, 0.02]
  dataset.mix_max_prob:
    values: [0.6, 0.7]
  dataset.mix_weights.ner:
    values: [1.5, 2.0, 2.5]
  dataset.mix_weights.pos:
    values: [3.0, 4.0, 5.0]
  dataset.mix_weights.sib:
    values: [2.5, 3.0, 3.5]
  dataset.mix_weights.news:
    values: [2.5, 3.0, 3.5]
  dataset.mix_weights.afrihg:
    values: [0.5, 0.6, 0.75]
  dataset.mix_weights.t2x:
    values: [0.7, 0.8, 0.9]
  peft.method:
    value: lora
  peft.kwargs.r:
    values: [64, 128, 256]
  peft.kwargs.lora_alpha:
    values: [128, 256, 512]
  peft.kwargs.lora_dropout:
    values: [0.0, 0.05, 0.1]
command:
  - ${env}
  - python
  - -u
  - -m
  - sallm.hpo.run
  - --base-config
  - finetune/llama_sa_general_all
