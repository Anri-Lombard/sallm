mode: TRAIN

wandb:
  project: "sallm-llama"

data:
  path: "${oc.env:SCRATCH}/masters/sallm/data/sallm_processed"
  train_split: "train"
  eval_split: "validation"
  test_split: "test"

tokenizer:
  path: "${oc.env:HOME}/masters/sallm/tokenizer/sallm_bpe_tokenizer"

training:
  output_dir: null
  logging_dir: null
  learning_rate: 4.0e-4
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.95
  num_train_epochs: 5
  per_device_train_batch_size: 12
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 4
  warmup_steps: 2000
  max_grad_norm: 1.0
  lr_scheduler_type: "cosine"
  bf16: true
  bf16_full_eval: true
  logging_steps: 10
  eval_strategy: "steps"
  eval_steps: 200
  save_strategy: "steps"
  save_steps: 500
  eval_accumulation_steps: 8
  save_total_limit: 2
  report_to: "wandb"
  resume_from_checkpoint: null
  ddp_find_unused_parameters: false
  prediction_loss_only: true
  torch_compile: true
  dataloader_num_workers: 8
