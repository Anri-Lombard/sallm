extends: "./base.yaml"

wandb:
  name: "125m-deepthin-gqa"

model:
  architecture: "llama"
  config:
    hidden_size: 512
    intermediate_size: 1024
    num_hidden_layers: 30
    num_attention_heads: 8
    num_key_value_heads: 4
    hidden_act: "silu"
    rms_norm_eps: 1.0e-6
    rope_theta: 10000.0
    tie_word_embeddings: true
  param_validation:
    min_params_m: 120.0
    max_params_m: 130.0

training:
  output_dir: "${oc.env:SCRATCH}/masters/sallm/checkpoints/sallm-llama-deepthin-gqa"
  logging_dir: "${oc.env:SCRATCH}/masters/sallm/logs/sallm-llama-deepthin-gqa"
