extends: "./base.yaml"

wandb:
  name: "125m-deepnarrow-42l"

model:
  architecture: "llama"
  config:
    hidden_size: 448
    intermediate_size: 896
    num_hidden_layers: 42
    num_attention_heads: 7
    num_key_value_heads: 4
    hidden_act: "silu"
    rms_norm_eps: 1.0e-6
    rope_theta: 10000.0
    tie_word_embeddings: true
  param_validation:
    min_params_m: 118.0
    max_params_m: 130.0

training:
  output_dir: "${oc.env:SCRATCH}/masters/sallm/checkpoints/sallm-llama-deepnarrow"
  logging_dir: "${oc.env:SCRATCH}/masters/sallm/logs/sallm-llama-deepnarrow"
