name: hpo-mamba-sa-general-all
project: sallm-ft
method: bayes
run_cap: 50
metric:
  name: eval/loss
  goal: minimize
parameters:
  # Training hyperparameters
  training.learning_rate:
    distribution: log_uniform_values
    min: 1.0e-5
    max: 5.0e-4
  training.weight_decay:
    distribution: uniform
    min: 0.0
    max: 0.2
  training.warmup_ratio:
    values: [0.0, 0.05, 0.1]
  training.lr_scheduler_type:
    values: [cosine, linear]
  training.gradient_accumulation_steps:
    values: [2, 4]
  training.per_device_train_batch_size:
    values: [4, 8, 16]  # CUDA kernels reduce memory, can go higher now
  training.num_train_epochs:
    values: [1, 2, 3]
  training.gradient_checkpointing:
    value: false
  dataset.max_seq_length:
    value: 1024

  # LoRA hyperparameters
  peft.method:
    value: lora
  peft.kwargs.r:
    values: [32, 64, 128]
  peft.kwargs.lora_alpha:
    values: [128, 256, 512]
  peft.kwargs.lora_dropout:
    values: [0.0, 0.05]

  # Mix weighting parameters (t2x fixed at 1.0 as reference)
  dataset.mix_temperature:
    distribution: uniform
    min: 0.0
    max: 0.5
  dataset.mix_min_prob:
    values: [0.01, 0.02, 0.05]
  dataset.mix_max_prob:
    values: [0.5, 0.6, 0.7]

  # Task weights (log scale for up/down weighting flexibility)
  # t2x fixed at 1.0 as reference, others tuned relative to it
  dataset.mix_weights.sib:
    distribution: log_uniform_values
    min: 0.5
    max: 5.0
  dataset.mix_weights.news:
    distribution: log_uniform_values
    min: 0.5
    max: 5.0
  dataset.mix_weights.ner:
    distribution: log_uniform_values
    min: 0.5
    max: 5.0
  dataset.mix_weights.afrihg:
    distribution: log_uniform_values
    min: 0.2
    max: 2.0
  dataset.mix_weights.t2x:
    value: 1.0

  training.eval_strategy:
    value: steps
  training.eval_steps:
    value: 500
command:
  - ${env}
  - python
  - -u
  - -m
  - sallm.hpo.run
  - --base-config
  - finetune/mamba_sa_general_all
