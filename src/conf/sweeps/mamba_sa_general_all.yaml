name: hpo-mamba-sa-general-all
project: sallm-ft
method: bayes
run_cap: 50
metric:
  name: eval/loss
  goal: minimize
parameters:
  training.learning_rate:
    distribution: log_uniform_values
    min: 3.0e-05
    max: 0.0003
  training.weight_decay:
    distribution: uniform
    min: 0.0
    max: 0.2
  training.warmup_ratio:
    values:
      - 0.05
      - 0.1
  training.lr_scheduler_type:
    value: constant_with_warmup
  training.gradient_accumulation_steps:
    value: 4
  training.per_device_train_batch_size:
    values:
      - 4
      - 8
  training.num_train_epochs:
    values:
      - 2
      - 3
  training.gradient_checkpointing:
    value: false
  dataset.max_seq_length:
    value: 1024
  peft.method:
    value: lora
  training.eval_strategy:
    value: steps
  training.eval_steps:
    value: 500
command:
  - ${env}
  - python
  - -u
  - -m
  - sallm.hpo.run
  - --base-config
  - finetune/mamba_sa_general_all
