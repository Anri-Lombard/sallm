defaults:
  - _self_
  - model: llama/125m
  - eval/_defaults

mode: EVALUATE

evaluation:
  overrides:
    lang: "xho"
  generator:
    name: "masakhaner"
    name_template: "masakhaner_{lang}_prompt_{i}"
    lang_map: {xho: xh, zul: zu, sot: st, tsn: tn}
    prompt_ids: [1, 2, 3, 4, 5]
    fewshot: 5
    batch_size: 8
    apply_chat_template: false
  output_dir: >
    ${oc.env:SCRATCH}/masters/sallm/results/eval/
    eval-${training.model_id}-${training.dataset}-${evaluation.overrides.lang}

wandb:
  project: "sallm-eval"
  name: "eval-${training.model_id}-${training.dataset}-${evaluation.overrides.lang}"

training:
  dataset: "masakhaner"
