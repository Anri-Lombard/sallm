architecture: ???
language: ???

defaults:
  - architecture: ${architecture}
  - _self_

mode: EVALUATE
eval_model:
  checkpoint: "${oc.env:SCRATCH}/masters/sallm/checkpoints/ft_${architecture}_instruct_${language}/final_merged_model"
  adapter: "hf"
  dtype: "bfloat16"
  device: "cuda:0"
  merge_lora: false

evaluation:
  task_packs: ["afrimgsm_${language}", "afrimmlu_${language}", "afrixnli_${language}"]
  output_dir: "${oc.env:SCRATCH}/masters/sallm/results/eval/ft_${architecture}_sa_${language}_tasks"

wandb:
  project: "sallm-eval"
  name: "eval-${architecture}-sa-${language}"
