mode: EVALUATE

eval_model:
  checkpoint: "${oc.env:SCRATCH}/masters/sallm/checkpoints/ft_mamba_125m_t2x_xho/final_adapter"
  adapter: "hf"
  dtype: "bfloat16"
  device: "cuda:0"
  merge_lora: false

evaluation:
  output_dir: "${oc.env:SCRATCH}/masters/sallm/results/eval/ft_mamba_125m_t2x_xho"
  generation_tasks:
    - id: "t2x_xho"
      split: "test"
      max_new_tokens: 2048
      max_samples_per_lang: null
      decoding:
        strategy: "beam"
        num_beams: 5
        length_penalty: 1.0
        early_stopping: true
      dataset:
        hf_name: "github:francois-meyer/t2x"
        subset: "xho"
        splits: {train: "train", val: "validation", test: "test"}
        task: INSTRUCTION
        templates:
          - {id: "t2x_verbalisation/v1", weight: 1}
        template_choice: ALL
        packing: false
        assistant_only_loss: true
        max_seq_length: 1024

tokenizer: null
model: null
data: null
training: null
dataset: null
peft: null
template: null

wandb:
  project: "sallm-eval"
  name: "eval-mamba-125m-t2x-xho"
