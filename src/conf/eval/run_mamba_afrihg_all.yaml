mode: EVALUATE

eval_model:
  checkpoint: "anrilombard/sallm-mamba-afrihg_all"
  adapter: "hf"
  dtype: "bfloat16"
  device: "cuda:0"
  merge_lora: false

evaluation:
  output_dir: "${oc.env:SCRATCH}/masters/sallm/results/eval/mamba_125m_afrihg_all"
  generation_tasks:
    - id: "afrihg_xho"
      split: "test"
      max_new_tokens: 256
      max_samples_per_lang: null
      fewshot: 0
      fewshot_split: "train"
      fewshot_seed: 42
      fewshot_lang_match: true
      fewshot_template_mode: "SAME"
      fewshot_token_budget: 1792
      prompt_headroom_tokens: 256
      system_prompt: "You are a concise isiXhosa news editor who drafts punchy headlines from article excerpts."
      decoding:
        strategy: "beam"
        num_beams: 5
        length_penalty: 0.7
        batch_size: 6
        early_stopping: true
      dataset:
        hf_name: "github:dadelani/AfriHG"
        subset: "xho"
        splits: {train: "train", val: "validation", test: "test"}
        task: INSTRUCTION
        templates:
          - {id: "afrihg_headline/v1", weight: 1}
        template_choice: ALL
        packing: false
        assistant_only_loss: true
        max_seq_length: 2048
    - id: "afrihg_zul"
      split: "test"
      max_new_tokens: 256
      max_samples_per_lang: null
      fewshot: 0
      fewshot_split: "train"
      fewshot_seed: 42
      fewshot_lang_match: true
      fewshot_template_mode: "SAME"
      fewshot_token_budget: 1792
      prompt_headroom_tokens: 256
      decoding:
        strategy: "beam"
        num_beams: 5
        length_penalty: 0.7
        batch_size: 6
        early_stopping: true
      dataset:
        hf_name: "github:dadelani/AfriHG"
        subset: "zul"
        splits: {train: "train", val: "validation", test: "test"}
        task: INSTRUCTION
        templates:
          - {id: "afrihg_headline/v1", weight: 1}
        template_choice: ALL
        packing: false
        assistant_only_loss: true
        max_seq_length: 2048

tokenizer: null
model: null
data: null
training: null
dataset: null
peft: null
template: null

wandb:
  project: "sallm-eval"
  name: "eval-mamba-125m-afrihg-all"
