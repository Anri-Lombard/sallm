mode: EVALUATE

eval_model:
  checkpoint: "anrilombard/sallm-xlstm-125m"
  dtype: "bfloat16"
  device: "cuda:0"

evaluation:
  output_dir: "${oc.env:SCRATCH}/masters/sallm/results/eval/xlstm_125m_t2x_xho_beam_rp"
  generation_tasks:
    - id: "t2x_xho"
      split: "test"
      max_new_tokens: 256
      max_samples_per_lang: null
      decoding:
        strategy: "beam"
        num_beams: 5
        repetition_penalty: 1.2
        no_repeat_ngram_size: 3
      dataset:
        hf_name: "github:francois-meyer/t2x"
        subset: "xho"
        splits: {train: "train", val: "validation", test: "test"}
        task: INSTRUCTION
        templates:
          - {id: "t2x_verbalisation/v1", weight: 1}
        template_choice: ALL
        packing: false
        assistant_only_loss: true
        max_seq_length: 1024

tokenizer: null
model: null
data: null
training: null
dataset: null
peft: null
template: null

wandb:
  project: "sallm-eval"
  name: "eval-xlstm-125m-t2x-xho"
