architecture: ???
language: ???

defaults:
  - architecture: ${architecture}
  - _self_

mode: EVALUATE
eval_model:
  checkpoint: "${oc.env:SCRATCH}/masters/sallm/checkpoints/ft_${architecture}_ner_${language}/final_merged_model"
  adapter: "hf"
  dtype: "bfloat16"
  device: "cuda:0"
  merge_lora: false

evaluation:
  task_packs: ["masakhaner_${language}"]
  output_dir: "${oc.env:SCRATCH}/masters/sallm/results/eval/ft_${architecture}_ner_${language}"

wandb:
  project: "sallm-eval"
  name: "eval-${architecture}-ner-${language}"
