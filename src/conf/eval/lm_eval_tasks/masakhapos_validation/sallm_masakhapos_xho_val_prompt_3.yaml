doc_to_text: |
  Acting as a linguist and without making any corrections or changes to the text,
  perform a part of speech (POS) analysis of the sentence using the following POS
  tag label annotation ['ADJ', 'ADP', 'ADV', 'AUX', 'CCONJ', 'DET', 'INTJ', 'NOUN',
  'NUM', 'PART', 'PRON', 'PROPN', 'PUNCT', 'SCONJ', 'SYM', 'VERB', 'X'].
  The input will be a list of words in the sentence. The output format should be a
  list of tuples, where each tuple consists of a word from the input text and its
  corresponding POS tag label from the POS tag label set provided. Your response
  should include only a list of tuples, in the order that the words appear in the
  input sentence, including punctuations, with each tuple containing the corresponding
  POS tag label for a word.

  Sentence: {{tokens}}
  Output:
