dataset_kwargs:
  data_files:
    train: https://github.com/masakhane-io/masakhane-pos/raw/main/data/xho/train.txt
    validation: https://github.com/masakhane-io/masakhane-pos/raw/main/data/xho/dev.txt
doc_to_text: |
  You are an expert in tagging words and sentences with the right POS tag.

  Please provide the POS tags for each word in the sentence. The input is a list
  of words in the sentence. POS tag label set: ['ADJ', 'ADP', 'ADV', 'AUX', 'CCONJ',
  'DET', 'INTJ', 'NOUN', 'NUM', 'PART', 'PRON', 'PROPN', 'PUNCT', 'SCONJ', 'SYM',
  'VERB', 'X']. The output format should be a list of tuples, where each tuple consists of a word
  from the input text and its corresponding POS tag label from the POS tag label set provided.
  Your response should include only a list of tuples, in the order that the words appear in the input
  sentence, including punctuations, with each tuple containing the corresponding POS tag label for a word.

  Sentence: {{tokens}}
  Output:
