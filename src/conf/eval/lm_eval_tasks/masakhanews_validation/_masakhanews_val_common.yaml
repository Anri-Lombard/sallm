dataset_path: masakhane/masakhanews
output_type: multiple_choice
validation_split: validation
doc_to_target: category
doc_to_choice:
  - "business"
  - "entertainment"
  - "health"
  - "politics"
  - "religion"
  - "sports"
  - "technology"
should_decontaminate: false
metric_list:
  - metric: f1
    aggregation: !function utils.weighted_f1_score
    average: weighted
    hf_evaluate: true
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
    regexes_to_ignore:
      - ","
      - '\$'
  - metric: acc
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
    regexes_to_ignore:
      - ","
      - '\$'
metadata:
  version: 1.0
