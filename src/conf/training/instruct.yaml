learning_rate: 3.0e-5
adam_beta2: 0.95
max_grad_norm: 1.0
gradient_accumulation_steps: 4
lr_scheduler_type: "cosine"
warmup_ratio: 0.1
per_device_train_batch_size: 16
per_device_eval_batch_size: 4
num_train_epochs: 3
bf16: true
logging_steps: 25
eval_strategy: "epoch"
save_strategy: "no"
dataloader_num_workers: 8
report_to: "wandb"
ddp_find_unused_parameters: false
