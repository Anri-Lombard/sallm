mode: TRAIN

wandb:
  project: "sallm-llama"
  name: "400m"

model:
  architecture: "llama"
  attn_implementation: "sdpa"
  config:
    attn_implementation: "sdpa"
    hidden_size: 1024
    intermediate_size: 2688
    num_hidden_layers: 29
    num_attention_heads: 8
    num_key_value_heads: 4
    rms_norm_eps: 1.0e-5
    rope_theta: 10000.0
    tie_word_embeddings: true
  param_validation:
    min_params_m: 380.0
    max_params_m: 430.0

data:
  path: "${oc.env:SCRATCH}/masters/sallm/data/sallm_processed"
  train_split: "train"
  eval_split: "validation"
  test_split: "test"

tokenizer:
  path: "${oc.env:HOME}/masters/sallm/tokenizer/sallm_bpe_tokenizer"

training:
  output_dir: "${oc.env:SCRATCH}/masters/sallm/checkpoints/sallm-llama-400m"
  logging_dir: "${oc.env:SCRATCH}/masters/sallm/logs/sallm-llama-400m"
  max_seq_length: 2048
  learning_rate: 3.0e-4
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  num_train_epochs: 5
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 4
  warmup_steps: 2000
  max_grad_norm: 1.0
  lr_scheduler_type: "cosine"
  bf16: true
  bf16_full_eval: true
  logging_steps: 10
  eval_strategy: "steps"
  eval_steps: 200
  eval_accumulation_steps: 8
  save_total_limit: 1
  report_to: "wandb"
  resume_from_checkpoint: null
  ddp_find_unused_parameters: false
  prediction_loss_only: true
  torch_compile: true
  dataloader_num_workers: 8
