mode: TRAIN

wandb:
  # TODO set all wand info and make sure it's passed
  project: "sallm-llama"
  # name: "125m"
  name: "125m"

model:
  architecture: "llama"
  attn_implementation: "flash_attention_2"
  # TODO: find research on these params
  # TODO: different architectural params?
  config:
    hidden_size: 512
    intermediate_size: 1536
    num_hidden_layers: 30
    num_attention_heads: 9
    rms_norm_eps: 1.0e-5
    rope_theta: 10000.0
    num_key_value_heads: 3
    tie_word_embeddings: true
  param_validation:
    min_params_m: 120.0
    max_params_m: 130.0

data:
  path: "${oc.env:SCRATCH}/masters/sallm/data/sallm_processed"
  train_split: "train"
  eval_split: "validation"
  test_split: "test"

tokenizer:
  path: "${oc.env:HOME}/masters/sallm/tokenizer/sallm_bpe_tokenizer"

training:
  output_dir: "${oc.env:SCRATCH}/masters/sallm/checkpoints/sallm-llama-125m"
  logging_dir: "${oc.env:SCRATCH}/masters/sallm/logs/sallm-llama-125m"
  max_seq_length: 2048
  learning_rate: 4.0e-4
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.95
  num_train_epochs: 3
  per_device_train_batch_size: 12
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 4
  warmup_steps: 2000
  max_grad_norm: 1.0
  lr_scheduler_type: "cosine"
  bf16: true
  bf16_full_eval: true
  logging_steps: 10
  eval_strategy: "steps"
  eval_steps: 200
  # save_strategy: "steps"
  # save_steps: 500
  eval_accumulation_steps: 8
  save_total_limit: 1
  report_to: "wandb"
  resume_from_checkpoint: null
  ddp_find_unused_parameters: false
  prediction_loss_only: true
  torch_compile: true
  dataloader_num_workers: 8
